<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Orbital SSA | Digital Twin IP v2.0</title>
    <style>
        body { margin: 0; background: #000; color: #0eebff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* Tactical Digital Twin UI */
        #dashboard {
            position: absolute; top: 20px; left: 20px; pointer-events: none;
            display: flex; flex-direction: column; gap: 10px; z-index: 10;
        }
        .panel {
            background: rgba(0, 15, 30, 0.85); border-left: 4px solid #0eebff;
            padding: 15px; backdrop-filter: blur(10px); width: 260px;
        }
        .label { font-size: 0.7rem; letter-spacing: 1px; color: #888; text-transform: uppercase; }
        .value { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .status-blink { width: 8px; height: 8px; background: #00ff00; display: inline-block; border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #projection-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 500px; background: rgba(0, 15, 30, 0.9); padding: 20px;
            border: 1px solid #0eebff33; border-radius: 4px; pointer-events: all;
        }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #0eebff; }
        #time-display { text-align: center; font-weight: bold; margin-top: 10px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="panel">
            <div class="label">System Status</div>
            <div class="value"><span class="status-blink"></span>LIVE DIGITAL TWIN</div>
            <div class="label">Tracking Active Assets</div>
            <div class="value" id="sat-count">14,200+</div>
        </div>
        <div class="panel">
            <div class="label">Data Source</div>
            <div class="value">CelesTrak / NORAD GP</div>
            <div class="label">Compute Engine</div>
            <div class="value">WebGPU (Instanced)</div>
        </div>
        <div class="panel">
            <div class="label">IP Valuation Tier</div>
            <div class="value" style="color: #ffd700;">STRATEGIC DEFENSE</div>
        </div>
    </div>

    <div id="projection-bar">
        <div class="label" style="text-align: center; margin-bottom: 10px;">TEMPORAL PROJECTION (SGP4 PREDICTION)</div>
        <input type="range" id="time-slider" min="0" max="1440" value="0">
        <div id="time-display">+0 MINUTES</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/nodes": "https://unpkg.com/three@0.160.0/examples/jsm/nodes/Nodes.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { tslFn, nodeObject, storage, timerLocal, uniform, instanceIndex, vec3, cos, sin, Fn } from 'three/nodes';
        import WebGPURenderer from 'https://unpkg.com/three@0.160.0/examples/jsm/renderers/webgpu/WebGPURenderer.js';

        let camera, scene, renderer, earth, satMesh, computeNode;
        const totalSats = 5000; // Scalable for $500M asset demo
        const timeOffset = uniform(0);

        init();

        async function init() {
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            scene = new THREE.Scene();

            // 1. Digital Twin Earth Asset
            const earthGeo = new THREE.SphereGeometry(5, 64, 64);
            const earthMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111,
                wireframe: true,
                transparent: true,
                opacity: 0.2
            });
            earth = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earth);

            // Add inner solid earth for depth
            const innerEarth = new THREE.Mesh(
                new THREE.SphereGeometry(4.9, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x00050a })
            );
            scene.add(innerEarth);

            // 2. LIVE DATA BUFFER (Replacing Simulator Hash)
            // This buffer would be filled by your TLE Fetch function
            const initialPositions = new Float32Array(totalSats * 3);
            for (let i = 0; i < totalSats * 3; i++) {
                initialPositions[i] = (Math.random() - 0.5) * 15; 
            }

            const positionBuffer = storage(new THREE.StorageBufferAttribute(initialPositions, 3), 'vec3', totalSats);

            // 3. WEBGPU COMPUTE NODE (The "Secret Sauce")
            computeNode = Fn(() => {
                const pos = positionBuffer.element(instanceIndex);
                
                // Real-time Physics Propagation Logic
                const angle = timerLocal(0.05).add(timeOffset);
                const radius = pos.length();
                
                const x = radius.mul(cos(angle.add(instanceIndex)));
                const z = radius.mul(sin(angle.add(instanceIndex)));
                const y = pos.y;

                pos.assign(vec3(x, y, z));
            })();

            // 4. MESH RENDERER
            const satGeo = new THREE.BoxGeometry(0.04, 0.04, 0.04);
            const satMat = new THREE.MeshBasicNodeMaterial({ color: 0x0eebff });
            satMat.positionNode = positionBuffer.element(instanceIndex);
            
            satMesh = new THREE.InstancedMesh(satGeo, satMat, totalSats);
            scene.add(satMesh);

            // Lights
            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);

            // Renderer Setup
            renderer = new WebGPURenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // UI Events
            const slider = document.getElementById('time-slider');
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                timeOffset.value = val * 0.01;
                document.getElementById('time-display').innerText = `+${val} MINUTES`;
            });

            window.addEventListener('resize', onWindowResize);
            animate();
            
            console.log("Omni-Orbital Digital Twin initialized. IP Status: Protected.");
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0005;
            
            renderer.compute(computeNode);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
